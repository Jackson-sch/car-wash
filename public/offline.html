<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin Conexión - CarWash Pro</title>
  <style>
    body {
      background-color: #050510;
      color: #e4e4e7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .orb {
      pointer-events: none;
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      z-index: 1;
    }
    .orb-1 {
      top: -10%;
      left: -10%;
      background: radial-gradient(circle, #0ea5e9 0%, transparent 70%);
    }
    .orb-2 {
      bottom: -10%;
      right: -10%;
      background: radial-gradient(circle, #8b5cf6 0%, transparent 70%);
    }
    .container {
      position: relative;
      z-index: 10;
      max-width: 450px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      padding: 40px 30px;
      backdrop-filter: blur(20px);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
    }
    .icon-container {
      width: 70px;
      height: 70px;
      border-radius: 20px;
      background: linear-gradient(135deg, #0ea5e9, #06b6d4);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 25px;
      box-shadow: 0 0 25px rgba(14, 165, 233, 0.3);
    }
    .icon {
      width: 32px;
      height: 32px;
      color: #050510;
    }
    h1 {
      font-size: 22px;
      font-weight: 800;
      margin: 0 0 10px;
      background: linear-gradient(to right, #ffffff, #d4d4d8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 13.5px;
      line-height: 1.6;
      color: #71717a;
      margin: 0 0 25px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0ea5e9, #38bdf8);
      color: #050510;
      font-weight: 700;
      font-size: 13.5px;
      padding: 12px 24px;
      border-radius: 12px;
      text-decoration: none;
      transition: all 0.2s ease;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(14, 165, 233, 0.2);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 25px rgba(14, 165, 233, 0.35);
    }
    .btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="container">
    <div class="icon-container">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"></line>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.5"></path>
        <path d="M5 12.5a10.94 10.94 0 0 1 5.83-2.84"></path>
        <path d="M8.58 8.58a15 15 0 0 1 13.84 3.09"></path>
        <path d="M1.42 11.67a15 15 0 0 1 7.16-3.09"></path>
        <line x1="12" y1="18" x2="12.01" y2="18"></line>
      </svg>
    </div>
    <h1>Sin conexión a internet</h1>
    <p>Parece que no tienes acceso a la red en este momento. La aplicación de CarWash Pro requiere conexión activa para sincronizar datos operativos, pero puedes reintentar cuando recuperes señal.</p>
    <a onclick="window.location.reload()" class="btn">Reintentar Conexión</a>
  </div>
</body>
</html>
